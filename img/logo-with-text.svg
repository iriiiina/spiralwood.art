<svg width="400" height="320" viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="30%" stop-color="#000000" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Spiral -->
  <g fill="none" stroke="black" stroke-width="3" stroke-linecap="round" transform="translate(200,130)">
    <circle cx="0" cy="0" r="95" opacity="0.95"/>
    <circle cx="0" cy="0" r="77" opacity="0.8"/>
    <circle cx="0" cy="0" r="59" opacity="0.65"/>
    <circle cx="0" cy="0" r="41" opacity="0.5"/>
    <circle cx="0" cy="0" r="23" opacity="0.35"/>
    <circle cx="0" cy="0" r="2" fill="black" fill-opacity="0.4" stroke="none"/>
  </g>

  <!-- Waveform -->
  <path d="M60 130 Q130 108 200 130 T340 130" fill="none" stroke="url(#waveGrad)" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>

  <!-- Artist name -->
  <text x="50%" y="280" text-anchor="middle" fill="black" fill-opacity="0.92"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="24" font-weight="300" letter-spacing="8">
    SPIRAL WOOD
  </text>
</svg>
